<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rohit's Art</title>

<style>
body{
  margin:0;
  font-family:sans-serif;
  background:linear-gradient(270deg,#0f172a,#1e3a8a,#9333ea);
  background-size:600% 600%;
  animation:bgMove 10s infinite;
  color:white;
}

/* BACKGROUND ANIMATION */
@keyframes bgMove{
  0%{background-position:0%}
  50%{background-position:100%}
  100%{background-position:0%}
}

/* LOADER */
#loader{
  position:fixed;
  width:100%;
  height:100vh;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  padding:15px;
}

/* HERO */
.hero{
  text-align:center;
  padding:60px;
}

/* CARD */
.card{
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(10px);
  padding:20px;
  margin:20px;
  border-radius:15px;
  text-align:center;
}

/* GALLERY */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  padding:20px;
}

.grid img{
  width:100%;
  border-radius:10px;
  transition:0.4s;
}

.grid img:hover{
  transform:scale(1.1);
}

/* FORM */
.form{
  text-align:center;
  padding:20px;
}

input,textarea{
  width:90%;
  max-width:400px;
  margin:10px;
  padding:10px;
  border:none;
  border-radius:5px;
}

/* BUTTON */
button{
  padding:10px 20px;
  border:none;
  background:#38bdf8;
  cursor:pointer;
  border-radius:5px;
  transition:0.3s;
}

button:hover{
  transform:scale(1.1);
  background:#22c55e;
}

/* SCROLL ANIMATION */
.hidden{
  opacity:0;
  transform:translateY(30px);
  transition:all 1s;
}

.show{
  opacity:1;
  transform:translateY(0);
}

/* FOOTER */
footer{
  text-align:center;
  padding:20px;
}
</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">Loading...</div>

<!-- NAV -->
<nav>
  <h2>Rohit's Art</h2>
</nav>

<!-- HERO -->
<section class="hero hidden">
  <h1>✨ Custom Anime Art 🎨</h1>
  <p>Handmade Chibi Drawings</p>
</section>

<!-- GALLERY -->
<div class="grid hidden">
  <img src="Tanziro.jpeg.jpeg">
  <img src="✨ Wallpapers Fofos _ Feito para Você 🌷.jpeg">
  <img src="download (6).jpeg">
  <img src="download (8).jpeg">
</div>

<!-- PRICING -->
<div class="card hidden">
  <h3>Pricing</h3>
  <p>A5: ₹150-300</p>
  <p>A4: ₹250-400</p>
  <p>Name & Background: Free</p>
  <p>Gift: ₹50 extra</p>
</div>

<!-- ORDER FORM -->
<div class="form hidden">
  <h2>Order Now</h2>

  <input type="text" id="name" placeholder="Your Name" required><br>
  <input type="text" id="size" placeholder="Size (A5/A4)" required><br>
  <input type="text" id="address" placeholder="Your Address" required><br>
  <textarea id="details" placeholder="Details / Reference link"></textarea><br>

  <button onclick="sendOrder()">Send Order</button>
</div>

<!-- PAYMENT -->
<div class="card hidden">
  <h2>💳 Payment</h2>
  <p>Pay using GPay / PhonePe / Paytm</p>

  <!-- A5 -->
  <a href="upi://pay?pa=rohitsarkar03122004@oksbi&pn=Rohit&am=300&tn=A5 Art Payment&cu=INR">
    <button>Pay ₹300 (A5)</button>
  </a>

  <br><br>

  <!-- A4 -->
  <a href="upi://pay?pa=rohitsarkar03122004@oksbi&pn=Rohit&am=400&tn=A4 Art Payment&cu=INR">
    <button>Pay ₹400 (A4)</button>
  </a>

  <br><br>

  <!-- QR -->
  <h3>Or Scan & Pay</h3>
  <img src="GooglePay_QR.png" width="200" style="border-radius:10px;">
  <p>Scan using any UPI app</p>
</div>

<!-- FOOTER -->
<footer class="hidden">
  <p>Instagram: rrrohittt_3</p>
  <p>WhatsApp: 8927598500</p>
</footer>

<script>
// LOADER
window.addEventListener("load",()=>{
  document.getElementById("loader").style.display="none";
});

// SCROLL ANIMATION
const observer = new IntersectionObserver(entries=>{
  entries.forEach(entry=>{
    if(entry.isIntersecting){
      entry.target.classList.add("show");
    }
  });
});

document.querySelectorAll(".hidden").forEach(el=>{
  observer.observe(el);
});

// WHATSAPP ORDER
function sendOrder(){
  let name = document.getElementById("name").value;
  let size = document.getElementById("size").value;
  let address = document.getElementById("address").value;
  let details = document.getElementById("details").value;

  let msg = `New Order:
Name: ${name}
Size: ${size}
Address: ${address}
Details: ${details}`;

  let url = "https://wa.me/918927598500?text=" + encodeURIComponent(msg);

  window.open(url, "_blank");
}
</script>

</body>
</html>
